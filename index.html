<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="/favicon-16x16.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Project</title>
</head>

<body>
    <div class="container">
        <div id="top-index">
            <h2 class="top-h1-index">Weather Project</h2>
        </div>
        <div id="middle-index">
            <button id="searchButton">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-search"
                    viewBox="0 0 16 16">
                    <path
                        d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
                </svg>
            </button>
            <form action="/result" method="post">
                <div id="searchContainer">
                    <input type="text" id="searchInput" placeholder="City Name" name="cityName">
                    <button id="submitSearch" type="submit">Send</button>
                </div>
            </form>
        </div>
    </div>
    <footer>
        <p>@2023 <a href="https://felipemt21.github.io/curriculo/">João Felipe</a></p>
    </footer>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="/java.js"></script>
</body>

</html>
